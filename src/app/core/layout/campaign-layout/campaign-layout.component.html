<div class="campaign-wrapper">
  <aside class="sidebar" [class.collapsed]="isSidebarCollapsed">
    <div class="brand-box">
      <span class="brand-kanji">計</span>
      <span class="brand-text">HAKARI</span>
    </div>
    <nav class="nav-menu">
      <a routerLink="/dashboard" class="nav-item">
        <span>▤</span>
        <label>Dashboard</label>
      </a>
      <a routerLink="./" class="nav-item" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <span>⌂</span>
        <label>Home</label>
      </a>
      <a routerLink="sessions" class="nav-item" routerLinkActive="active">
        <span>📅</span>
        <label>Sessions</label>
      </a>
      <a routerLink="notes" class="nav-item" routerLinkActive="active">
        <span>📝</span>
        <label>Notes</label>
      </a>
      <a routerLink="npcs" class="nav-item" routerLinkActive="active">
        <span>👤</span>
        <label>NPCs</label>
      </a>
      <a routerLink="locations" class="nav-item" routerLinkActive="active">
        <span>📍</span>
        <label>Locations</label>
      </a>
      <a routerLink="items" class="nav-item" routerLinkActive="active">
        <span>⚔</span>
        <label>Items</label>
      </a>
      <a routerLink="characters" class="nav-item" routerLinkActive="active">
        <span>🛡</span>
        <label>Characters</label>
      </a>
      <a routerLink="encounters" class="nav-item" routerLinkActive="active">
        <span>🔥</span>
        <label>Encounters</label>
      </a>
      <a routerLink="monsters" class="nav-item" routerLinkActive="active">
        <span>👹</span>
        <label>Monsters</label>
      </a>
      <a routerLink="maps" class="nav-item" routerLinkActive="active">
        <span>🗺</span>
        <label>Maps</label>
      </a>
      <a routerLink="resources" class="nav-item" routerLinkActive="active">
        <span>📂</span>
        <label>Resources</label>
      </a>
    </nav>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <div class="top-left">
        <button class="icon-btn" (click)="toggleSidebar()">☰</button>
        <button class="icon-btn" (click)="themeService.toggle()">
          {{ themeService.current === 'dark' ? '○' : '●' }}
        </button>
      </div>

      <div class="search-box">
        <input type="text" placeholder="SEARCH ENTITIES..." class="search-input">
      </div>

      <div class="top-right">
        <button class="icon-btn" (click)="toggleSidePanel()">▨</button>
      </div>
    </header>

    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </main>

  <aside class="side-panel" [class.open]="isSidePanelOpen">
    <div class="panel-header">
      <span>CONTEXT MANAGER</span>
      <button class="close-btn" (click)="closePanel()">✕</button>
    </div>
    <div class="panel-content" *ngIf="activeContext">
      <div class="context-type">{{ activeContext.type | uppercase }}</div>
      <h3 class="context-title">{{ activeContext.data.name || activeContext.data.title }}</h3>
      <p class="context-desc">{{ activeContext.data.description }}</p>
      <button class="full-view-btn" [routerLink]="['../', activeContext.type, activeContext.data.id]">
        OPEN FULL PROFILE
      </button>
    </div>
  </aside>
</div>
