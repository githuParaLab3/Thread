<div class="resource-view-container" *ngIf="resource">
  <header class="view-header">
    <div class="meta-info">
      <span class="resource-type">{{ resource.type }}</span>
    </div>
    <input type="text" class="title-input" [(ngModel)]="resource.title" (change)="saveResource()">
    <button class="action-btn btn-danger" (click)="openDeleteModal()">[ DELETE ]</button>
  </header>

  <div class="view-content" style="padding: 24px;">
    <div class="hakari-form-group">
      <label>EXTERNAL URL / SECURE PATH</label>
      <input type="text" class="hakari-input" [(ngModel)]="resource.external_url" (change)="saveResource()" placeholder="https://...">
    </div>

    <div class="hakari-form-group" style="margin-top: 16px;">
      <label>OR UPLOAD LOCAL MEDIA</label>
      <input type="file" class="hakari-input" (change)="onFileSelected($event)" accept="image/*,application/pdf" [disabled]="isUploading">
      <span *ngIf="isUploading" style="color: var(--highlight-primary); font-family: var(--font-mono); font-size: 0.8rem; margin-top: 8px; display: block;">UPLOADING TO MAINFRAME...</span>
    </div>

    <div class="resource-preview" *ngIf="resource.external_url && (resource.type === 'URL' || resource.type === 'PDF')" style="margin-top: 24px;">
      <iframe [src]="resource.external_url | safeUrl" width="100%" height="700px" frameborder="0" style="border-radius: var(--radius-sm); border: 1px solid var(--border-color); background: #fff;"></iframe>
    </div>

    <div class="resource-preview" *ngIf="resource.external_url && resource.type === 'Image'" style="margin-top: 24px;">
      <img [src]="resource.external_url" alt="Resource content" style="max-width: 100%; border-radius: var(--radius-sm); border: 1px solid var(--border-color);">
    </div>

    <div class="hakari-form-group" style="margin-top: 24px;">
      <label>NOTES / DESCRIPTION</label>
      <textarea class="hakari-input description-area" [(ngModel)]="resource.description" (change)="saveResource()" placeholder="Description..."></textarea>
    </div>
  </div>

  <app-confirm-modal
    *ngIf="isDeleteModalOpen"
    title="DELETE RESOURCE"
    message="This will permanently erase the entity from the campaign database. Proceed?"
    confirmText="ERASE"
    (confirm)="confirmDelete()"
    (close)="closeDeleteModal()">
  </app-confirm-modal>
</div>
