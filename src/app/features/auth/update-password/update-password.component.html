<div class="login-layout">
  <header class="login-topbar">
    <div class="brand-box">
      <span class="brand-kanji">計</span>
      <span class="brand-text">HAKARI</span>
    </div>
    <button class="icon-btn" (click)="themeService.toggleTheme()">
      <span class="material-symbols-outlined">
        {{ themeService.isDarkMode ? 'light_mode' : 'dark_mode' }}
      </span>
    </button>
  </header>

  <main class="login-content">
    <div class="login-card">
      <div class="card-header">
        <h1>Update Password</h1>
        <p>Establish a new security key for your account.</p>
      </div>

      <div class="card-body">
        <div class="form-group">
          <label>New Password</label>
          <input type="password" class="form-input" [(ngModel)]="password" placeholder="••••••••" [disabled]="loading">
        </div>

        <div class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</div>

        <button class="btn-primary full-width" (click)="submitForm()" [disabled]="loading">
          <span *ngIf="!loading">Confirm Update</span>
          <span *ngIf="loading">Processing...</span>
        </button>
      </div>
    </div>
  </main>
</div>
