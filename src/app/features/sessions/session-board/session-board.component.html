<div class="board-container">
  <div class="board-toolbar">
    <button class="action-btn" (click)="addNode()">[ + ADD NODE ]</button>
  </div>
  <div class="board-canvas">
    <div 
      class="board-node" 
      *ngFor="let node of nodes" 
      [style.left.px]="node.pos_x" 
      [style.top.px]="node.pos_y"
      (mousedown)="onMouseDown($event, node)">
      {{ node.title }}
    </div>
  </div>
</div>
