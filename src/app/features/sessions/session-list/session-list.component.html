<div class="session-list-container">
  <header class="section-header">
    <h2>SESSION LOGS</h2>
    <div class="header-actions">
      <div class="local-search-box">
        <span class="material-symbols-outlined search-icon">search</span>
        <input 
          type="text" 
          placeholder="SEARCH SESSIONS..." 
          class="search-input"
          [(ngModel)]="searchTerm"
          (input)="filterData()">
      </div>
      <button class="action-btn" (click)="createNewSession()">[ + NEW SESSION ]</button>
    </div>
  </header>

  <div class="session-grid">
    <div *ngFor="let session of filteredSessions" class="session-card" (click)="openSession(session.id)">
      <div class="session-meta">
        <span class="session-number">#{{ session.number }}</span>
      </div>
      <h3>{{ session.title }}</h3>
      <p class="session-summary">{{ session.summary }}</p>
    </div>
  </div>

  <div class="empty-state" *ngIf="filteredSessions.length === 0">
    <p>NO RECORDS FOUND.</p>
  </div>
</div>
