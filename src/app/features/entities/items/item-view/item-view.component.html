<div class="view-container" *ngIf="item">
  <header class="view-header">
    <input type="text" class="title-input" [(ngModel)]="item.name" (change)="saveItem()">
    <button class="action-btn btn-danger" (click)="openDeleteModal()">[ DELETE ITEM ]</button>
  </header>

  <div class="view-content">
    <div class="hakari-form-group">
      <label>VALUE (GP)</label>
      <input type="number" class="hakari-input" [(ngModel)]="item.value" (change)="saveItem()">
    </div>
    <div class="hakari-form-group">
      <label>DESCRIPTION</label>
      <textarea class="hakari-input description-area" [(ngModel)]="item.description" (change)="saveItem()"></textarea>
    </div>
  </div>

  <app-confirm-modal
    *ngIf="isDeleteModalOpen"
    title="DELETE ITEM"
    message="This will permanently erase the entity from the campaign database. Proceed?"
    confirmText="ERASE"
    (confirm)="confirmDelete()"
    (close)="closeDeleteModal()">
  </app-confirm-modal>
</div>
