<div class="view-container" *ngIf="character">
  <header class="view-header">
    <input type="text" class="title-input" [(ngModel)]="character.name" (change)="saveCharacter()">
    <button class="action-btn btn-danger" (click)="openDeleteModal()">[ DELETE CHARACTER ]</button>
  </header>

  <div class="view-content">
    <div class="hakari-form-group">
      <label>CLASS</label>
      <input type="text" class="hakari-input" [(ngModel)]="character.class" (change)="saveCharacter()">
    </div>
    <div class="hakari-form-group">
      <label>LEVEL</label>
      <input type="number" class="hakari-input" [(ngModel)]="character.level" (change)="saveCharacter()">
    </div>
    <div class="hakari-form-group">
      <label>BACKGROUND / NOTES</label>
      <textarea class="hakari-input description-area" [(ngModel)]="character.background" (change)="saveCharacter()"></textarea>
    </div>
  </div>

  <app-confirm-modal
    *ngIf="isDeleteModalOpen"
    title="DELETE CHARACTER"
    message="This will permanently erase the entity from the campaign database. Proceed?"
    confirmText="ERASE"
    (confirm)="confirmDelete()"
    (close)="closeDeleteModal()">
  </app-confirm-modal>
</div>
