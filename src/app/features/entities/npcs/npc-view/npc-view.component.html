<div class="view-container" *ngIf="npc">
  <header class="view-header">
    <input type="text" class="title-input" [(ngModel)]="npc.name" (change)="saveNpc()">
    <button class="action-btn btn-danger" (click)="openDeleteModal()">[ DELETE NPC ]</button>
  </header>

  <div class="view-content">
    <div class="hakari-form-group">
      <label>ROLE / TITLE</label>
      <input type="text" class="hakari-input" [(ngModel)]="npc.role" (change)="saveNpc()">
    </div>
    <div class="hakari-form-group">
      <label>DESCRIPTION</label>
      <textarea class="hakari-input description-area" [(ngModel)]="npc.description" (change)="saveNpc()"></textarea>
    </div>
  </div>

  <app-confirm-modal
    *ngIf="isDeleteModalOpen"
    title="DELETE NPC"
    message="This will permanently erase the entity from the campaign database. Proceed?"
    confirmText="ERASE"
    (confirm)="confirmDelete()"
    (close)="closeDeleteModal()">
  </app-confirm-modal>
</div>
