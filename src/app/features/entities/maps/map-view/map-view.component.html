<div class="view-container" *ngIf="mapData">
  <header class="view-header">
    <input type="text" class="title-input" [(ngModel)]="mapData.name" (change)="saveMap()">
    <button class="action-btn btn-danger" (click)="openDeleteModal()">[ DELETE MAP ]</button>
  </header>

  <div class="view-content">
    <div class="hakari-form-group">
      <label>TYPE</label>
      <select class="hakari-input" [(ngModel)]="mapData.type" (change)="saveMap()">
        <option value="Regional">Regional</option>
        <option value="Dungeon">Dungeon</option>
        <option value="City">City</option>
        <option value="Battlemap">Battlemap</option>
      </select>
    </div>
    <div class="hakari-form-group">
      <label>DESCRIPTION / NOTES</label>
      <textarea class="hakari-input description-area" [(ngModel)]="mapData.description" (change)="saveMap()"></textarea>
    </div>
  </div>

  <app-confirm-modal
    *ngIf="isDeleteModalOpen"
    title="DELETE MAP"
    message="This will permanently erase the entity from the campaign database. Proceed?"
    confirmText="ERASE"
    (confirm)="confirmDelete()"
    (close)="closeDeleteModal()">
  </app-confirm-modal>
</div>
